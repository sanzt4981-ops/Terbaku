<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Akademik - BahasaBaku AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from {opacity:0; transform: translateY(5px);} to {opacity:1; transform: translateY(0);} }
    
    .cbt-container { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
    @media (max-width: 768px) { .cbt-container { grid-template-columns: 1fr; } }

    .number-box {
        width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
        border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        background: white;
    }
    .number-box.active { border: 2px solid #4f46e5; color: #4f46e5; background: #eef2ff; }
    .number-box.filled { background: #10b981; color: white; border-color: #10b981; }

    .radio-option {
        display: block; padding: 15px; margin-top: 10px; border: 1px solid #e5e7eb;
        border-radius: 10px; cursor: pointer; transition: 0.2s; background: #fff;
    }
    .radio-option:hover { background: #f8fafc; }
    .radio-option input:checked + span { color: #4f46e5; font-weight: bold; }
    
    .sticky-panel { position: sticky; top: 100px; }
</style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen pb-10">

<nav class="bg-white shadow-md p-4 sticky top-0 z-50">
  <div class="container mx-auto flex justify-between items-center">
    <h1 class="text-2xl font-bold text-blue-600">
      BahasaBaku<span class="text-slate-800"> AI</span>
    </h1>
    <div class="space-x-6 text-sm md:text-base">
      <a href="index.html" class="hover:text-blue-600">Home</a>
      <a href="chatdosen.html" class="hover:text-blue-600">Chat</a>
      <a href="quiz.html" class="text-blue-600 font-semibold">Quiz</a>
      <a href="chat-dosen.html" class="hover:text-blue-600">Etika Chat</a>
    </div>
  </div>
</nav>

<div class="container mx-auto p-4 md:p-6 mt-4">
    <div class="cbt-container" id="quiz-wrapper">
        
        <main>
            <div id="question-card" class="bg-white p-8 rounded-2xl shadow-sm border min-h-[400px] relative">
                </div>

            <div class="flex justify-between mt-6">
                <button id="btn-prev" onclick="changeQuestion(-1)" class="px-6 py-2 bg-white border border-slate-300 rounded-lg font-bold hover:bg-slate-50 disabled:opacity-50">
                    <i class="fas fa-arrow-left mr-2"></i> Sebelumnya
                </button>
                <button id="btn-next" onclick="changeQuestion(1)" class="px-8 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 shadow-lg">
                    Selanjutnya <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </main>

        <aside class="sticky-panel">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center">
                    <i class="fas fa-th mr-2 text-indigo-500"></i> Navigasi Soal
                </h3>
                <div id="number-grid" class="grid grid-cols-5 gap-2 mb-6"></div>
                <hr class="mb-6">
                <button onclick="confirmFinish()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition shadow-md">
                    Selesai & Lihat Nilai
                </button>
            </div>
        </aside>

    </div>
</div>

<script>
/**
 * BANK SOAL (Anda bisa menambah sebanyak mungkin soal di sini)
 * Sistem akan otomatis memilih 10 soal acak dari tiap kategori.
 */
const bankMcq = [
    { q: "Dalam penulisan skripsi, manakah kata serapan yang baku?", options: ["Metodologi", "Metodelogi", "Methodologi", "Metodology"], correct: "Metodologi" },
    { q: "Mahasiswa sering salah menuliskan kata ini dalam email formal. Mana yang benar?", options: ["Silahturahmi", "Silaturahmi", "Silaturahim", "B dan C Benar"], correct: "B dan C Benar" },
    { q: "Manakah penulisan gelar akademik yang benar?", options: ["Dr. Andi, S.Kom., M.T.", "Dr Andi S.Kom M.T", "dr. Andi S.kom. M.t", "Dr. Andi S.Kom., MT"], correct: "Dr. Andi, S.Kom., M.T." },
    { q: "Saat mengutip sumber di daftar pustaka, penulisan 'halaman' yang benar adalah...", options: ["Hal.", "Halaman", "Hlm.", "Hlm"], correct: "Hlm." },
    { q: "Pilihlah kalimat yang menggunakan kata baku secara tepat!", options: ["Data dianalisa menggunakan SPSS.", "Data dianalisis menggunakan SPSS.", "Data di analisa menggunakan SPSS.", "Data dianilisas menggunakan SPSS."], correct: "Data dianalisis menggunakan SPSS." },
    { q: "Kata yang benar untuk kegiatan setelah sarjana adalah...", options: ["Pascasarjana", "Pasca Sarjana", "Paskasarjana", "Paska Sarjana"], correct: "Pascasarjana" },
    { q: "Manakah bentuk kata kerja yang baku?", options: ["Mempengaruhi", "Memengaruhi", "Mengpengaruhi", "Pempengaruhi"], correct: "Memengaruhi" },
    { q: "Dalam surat resmi, penulisan tanggal yang benar adalah...", options: ["20 Januari 2024", "20 Jan. 2024", "20-01-2024", "20/01/2024"], correct: "20 Januari 2024" },
    { q: "Manakah penulisan kata depan yang benar?", options: ["Diatas meja", "Di atas meja", "Di-atas meja", "Dia tas meja"], correct: "Di atas meja" },
    { q: "Bentuk baku dari kata 'revisi' yang sering salah adalah...", options: ["Efektifitas", "Efektivitas", "Efektifitas", "Efektivity"], correct: "Efektivitas" },
    { q: "Kata serapan yang benar dari kata 'System' adalah...", options: ["Sistim", "Sistem", "Sistime", "Sisitem"], correct: "Sistem" },
    { q: "Penulisan singkatan 'atas nama' yang benar adalah...", options: ["a/n", "a.n.", "an", "A.N"], correct: "a.n." },
    { q: "Manakah kata yang baku?", options: ["Kualitas", "Kwalitas", "Kwalitet", "Kualitet"], correct: "Kualitas" },
    { q: "Penulisan 'obyek' yang benar dalam KBBI adalah...", options: ["Objeck", "Obyek", "Objek", "Obyekan"], correct: "Objek" },
    { q: "Manakah penulisan kata serapan yang tepat?", options: ["Kwitansi", "Kuitansi", "Kwintansi", "Quidansi"], correct: "Kuitansi" }
];

const bankEssay = [
    "Mengapa dalam karya ilmiah kita harus menggunakan kata 'analisis' bukan 'analisa'?",
    "Perbaiki kalimat chat dosen berikut: 'P, pak saya mau bimbingan besok bisa gak?'",
    "Tuliskan perbedaan penggunaan 'di' sebagai imbuhan dan kata depan!",
    "Sebutkan 3 kata serapan asing yang sering salah tulis dalam laporan!",
    "Mengapa penulisan gelar 'S.Pd' menggunakan titik?",
    "Apa dampak penggunaan bahasa gaul dalam presentasi formal?",
    "Tuliskan bentuk baku dari: ijin, jadwal, antri, dan praktek!",
    "Jelaskan kapan kita harus menggunakan huruf miring (italics)!",
    "Buatlah kalimat pembuka email formal untuk mengirim tugas!",
    "Apakah bahasa baku mencerminkan profesionalisme mahasiswa? Jelaskan!",
    "Jelaskan aturan penulisan singkatan nama orang dalam surat resmi!",
    "Berikan contoh kalimat yang menggunakan tanda baca koma secara tepat sebelum konjungsi 'tetapi'!",
    "Ubah kalimat tidak baku ini: 'Kita harus merubah jadwal kumpul bimbingan.'",
    "Jelaskan fungsi abstrak dalam sebuah skripsi dan mengapa harus baku!",
    "Apa perbedaan kata 'pukul' dan 'jam' dalam menunjukkan waktu?"
];

let questions = [];
let currentIdx = 0;
let userAnswers = {};

// Fungsi Acak (Fisher-Yates)
function shuffle(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function init() {
    // 1. Ambil 10 MCQ secara acak dari bank soal
    const selectedMcq = shuffle(bankMcq).slice(0, 10).map(q => ({
        type: 'mcq',
        ...q,
        options: shuffle(q.options) // Acak urutan pilihan jawabannya juga
    }));

    // 2. Ambil 10 Essay secara acak dari bank soal
    const selectedEssay = shuffle(bankEssay).slice(0, 10).map(q => ({
        type: 'essay',
        q: q
    }));

    // 3. Gabungkan jadi 20 soal
    questions = [...selectedMcq, ...selectedEssay];
    
    renderGrid();
    renderQuestion();
}

// ... (Fungsi renderGrid, renderQuestion, saveAns, dll sama dengan sebelumnya)

function renderGrid() {
    const grid = document.getElementById('number-grid');
    grid.innerHTML = '';
    questions.forEach((_, i) => {
        const isFilled = userAnswers[i] && userAnswers[i].trim() !== "";
        grid.innerHTML += `<div onclick="goTo(${i})" class="number-box ${i === currentIdx ? 'active' : ''} ${isFilled ? 'filled' : ''}">${i + 1}</div>`;
    });
}

function renderQuestion() {
    const card = document.getElementById('question-card');
    const q = questions[currentIdx];
    const val = userAnswers[currentIdx] || "";

    card.innerHTML = `<div class="fade-in">
        <div class="flex justify-between items-center mb-6">
            <span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-bold uppercase tracking-widest">${q.type === 'mcq' ? 'Pilihan Ganda' : 'Esai'}</span>
            <span class="text-sm font-bold text-slate-400">Poin: 5</span>
        </div>
        <h2 class="text-2xl font-medium text-slate-800 mb-8">${currentIdx + 1}. ${q.q}</h2>
        <div id="options-area"></div>
    </div>`;

    const area = document.getElementById('options-area');
    if (q.type === 'mcq') {
        q.options.forEach(opt => {
            area.innerHTML += `
                <label class="radio-option">
                    <input type="radio" name="ans" value="${opt}" ${val === opt ? 'checked' : ''} onchange="saveAns(this.value)">
                    <span class="ml-3">${opt}</span>
                </label>`;
        });
    } else {
        area.innerHTML = `<textarea class="w-full border p-4 rounded-xl h-40 focus:ring-2 focus:ring-indigo-400 outline-none" 
            oninput="saveAns(this.value)" placeholder="Ketik jawaban Anda...">${val}</textarea>`;
    }
    
    document.getElementById('btn-prev').disabled = currentIdx === 0;
    document.getElementById('btn-next').innerText = currentIdx === questions.length - 1 ? "Selesai" : "Selanjutnya";
}

function saveAns(val) {
    userAnswers[currentIdx] = val;
    renderGrid();
}

function changeQuestion(step) {
    if (currentIdx + step >= 0 && currentIdx + step < questions.length) {
        currentIdx += step;
        renderQuestion();
        renderGrid();
    } else if (currentIdx + step === questions.length) {
        confirmFinish();
    }
}

function goTo(i) {
    currentIdx = i;
    renderQuestion();
    renderGrid();
}

function confirmFinish() {
    const totalAnswered = Object.keys(userAnswers).filter(k => userAnswers[k].trim() !== "").length;
    if (confirm(`Selesai dan lihat nilai?`)) {
        finishQuiz();
    }
}

function finishQuiz() {
    let score = 0;
    let correctMcq = 0;
    let filledEssay = 0;

    questions.forEach((q, i) => {
        if (q.type === 'mcq') {
            if (userAnswers[i] === q.correct) {
                score += 5;
                correctMcq++;
            }
        } else {
            if ((userAnswers[i] || "").trim().length > 5) {
                score += 5;
                filledEssay++;
            }
        }
    });

    // --- LOGIKA PESAN DINAMIS ---
    let feedbackMsg = "";
    let feedbackColor = "";
    let emoji = "";

    if (score >= 90) {
        feedbackMsg = "Gila, kamu jago banget! Dosen pembimbing pasti bangga baca skripsimu.";
        feedbackColor = "text-green-600";
        emoji = "👑";
    } else if (score >= 70) {
        feedbackMsg = "Keren! Pemahaman bahasa bakumu sudah di atas rata-rata mahasiswa nih.";
        feedbackColor = "text-blue-600";
        emoji = "🚀";
    } else if (score >= 50) {
        feedbackMsg = "Lumayan lah, tapi masih ada beberapa yang typo atau keliru. Semangat!";
        feedbackColor = "text-yellow-600";
        emoji = "📚";
    } else {
        feedbackMsg = "Waduh, kayaknya kamu harus belajar lagi deh biar nggak kena revisi terus.";
        feedbackColor = "text-red-600";
        emoji = "😴";
    }

    // Tampilkan Hasil
    document.getElementById('quiz-wrapper').innerHTML = `
        <div class="col-span-full bg-white p-12 rounded-3xl shadow-xl text-center fade-in">
            <div class="text-6xl mb-4">${emoji}</div>
            <h1 class="text-4xl font-bold text-indigo-700 mb-2">Skor Akhir: ${score}</h1>
            
            <div class="max-w-md mx-auto mb-8">
                <p class="text-xl font-semibold ${feedbackColor}">${feedbackMsg}</p>
            </div>

            <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-10 text-left">
                <div class="bg-slate-50 p-4 rounded-2xl border">
                    <div class="text-xs text-slate-400 font-bold uppercase">Benar (PG)</div>
                    <div class="text-xl font-bold">${correctMcq} / 10</div>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border">
                    <div class="text-xs text-slate-400 font-bold uppercase">Terisi (Esai)</div>
                    <div class="text-xl font-bold">${filledEssay} / 10</div>
                </div>
            </div>

            <button onclick="location.reload()" class="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg transition-all active:scale-95">
                Ayo Coba Lagi 
            </button>
            <br>
            <a href="index.html" class="inline-block mt-6 text-indigo-500 font-semibold hover:underline">Kembali ke Home</a>
        </div>`;
    window.scrollTo(0,0);
}

init();
</script>
</body>
</html>
