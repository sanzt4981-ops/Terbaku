Template Chat Dosen

Aplikasi pembuat chat formal otomatis untuk mahasiswa

<input id="dosen" class="input md:col-span-2" placeholder="Nama Dosen">

<option value="">Auto Detect (Rekomendasi)</option>

<option value="Ibu">Ibu</option>

<script>

const titles = [
"Meminta Bimbingan",
"Izin Tidak Hadir",
"Izin Terlambat",
"Izin Sakit",
"Izin Berduka",
"Menanyakan Nilai",
"Meminta Tanda Tangan",
"Follow-up Pesan",
"Konsultasi Akademik",
"Menyerahkan Revisi",
"Tanda Tangan KRS",
"Wawancara Dosen",
"Izin ke Dokter",
"Izin Mendadak",
"Izin Bimbingan",
"Meminta Materi",
"Kendala Jaringan",
"Izin Seminar",
"Izin Organisasi"
];

function cleanNamaDosen(dosen){
  return dosen
    .replace(/^(pak|bapak|bu|ibu)\s+/i, "")
    .trim();
}

function getSapaan(dosen, pilihan){

  if(pilihan) return pilihan;

  const d = dosen.toLowerCase().trim();

  if(
    d.includes("ibu") ||
    d.startsWith("bu ") ||
    d.startsWith("ibu")
  ){
    return "Ibu";
  }

  if(
    d.includes("bapak") ||
    d.startsWith("pak ") ||
    d.startsWith("bapak")
  ){
    return "Bapak";
  }

  return "Bapak/Ibu";
}

`Selamat pagi, ${sapaan} ${dosen}. Mohon maaf mengganggu waktunya. Saya ${nama}, NIM ${nim}, Program Studi ${prodi}.

Saya akan bertanggung jawab mempelajari materi yang tertinggal. Terima kasih.`

];

}

function renderTemplates(){

const nama = document.getElementById("nama").value || "[Nama]";
const nim = document.getElementById("nim").value || "[NIM]";
const prodi = document.getElementById("prodi").value || "[Program Studi]";
const dosenInput = document.getElementById("dosen").value || "[Nama Dosen]";
const pilihan = document.getElementById("sapaan").value;

const sapaan = getSapaan(dosenInput,pilihan);

const dosen = cleanNamaDosen(dosenInput);

const data = templates(
  nama,
  nim,
  prodi,
  dosen,
  sapaan
);

const root = document.getElementById("templates");

root.innerHTML = "";

data.forEach((t,i)=>{

root.innerHTML += `
<div class="card fade-in">

<h3 class="font-bold text-indigo-600 mb-2">
${i+1}. ${titles[i]}
</h3>

<pre id="t${i}" class="whitespace-pre-wrap text-sm mb-3">
${t}
</pre>

<button onclick="copyText('t${i}',this)" class="btn">
📋 Salin
</button>

</div>
`;

});

}

function copyText(id,btn){

navigator.clipboard.writeText(
  document.getElementById(id).innerText
);

btn.innerText = "✔ Tersalin";

setTimeout(()=>{
  btn.innerText = "📋 Salin";
},1500);

}

renderTemplates();

</script>
